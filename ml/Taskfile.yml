version: "3"

vars:
  VENV: "{{.TASKFILE_DIR}}/.venv/bin"
  DATASET: "{{.TASKFILE_DIR}}/datasets/eurio-poc"
  CHECKPOINTS: "{{.TASKFILE_DIR}}/checkpoints"
  OUTPUT: "{{.TASKFILE_DIR}}/output"
  ASSETS: "{{.TASKFILE_DIR}}/../app-android/src/main/assets"

tasks:
  # ---------- Full pipeline ----------
  default:
    desc: Run the full ML pipeline (prepare → train → export → deploy)
    cmds:
      - task: prepare
      - task: train
      - task: evaluate
      - task: visualize
      - task: export
      - task: validate
      - task: embeddings
      - task: deploy
      - task: seed

  # ---------- Eval-real (device golden set) ----------
  eval-real:sync:
    desc: "Normalize the device-pulled eval_real/ snaps into datasets/eval_real_norm/. Usage: go-task ml:eval-real:sync -- <debug_pull_dir>"
    cmds:
      - "{{.VENV}}/python -m scan.sync_eval_real {{.CLI_ARGS}} --clear"

  eval-real:eval:
    desc: "Per-snap eval against deployed centroids (output/embeddings_v1.json). Pass --from-checkpoint-W to compare against the raw ArcFace W."
    cmds:
      - "{{.VENV}}/python -m scan.eval_real_snaps {{.CLI_ARGS}}"

  scan:diff:
    desc: "Validate the Kotlin SnapNormalizer port against Python normalize_snap on a debug pull. Usage: go-task ml:scan:diff -- <debug_pull_dir> [--write-diff]"
    cmds:
      - "{{.VENV}}/python -m scan.diff_kotlin_python {{.CLI_ARGS}}"

  # ---------- Individual steps ----------
  prepare:
    desc: Resize images and split into train/val/test
    cmds:
      - "{{.VENV}}/python training/prepare_dataset.py"
    sources:
      - datasets/*/
    generates:
      - datasets/eurio-poc/train/*/
      - datasets/eurio-poc/val/*/
      - datasets/eurio-poc/test/*/

  train:
    desc: "Train the coin model (default: classification mode)"
    deps: [prepare]
    cmds:
      - >-
        {{.VENV}}/python training/train_embedder.py
        --mode classify
        --dataset {{.DATASET}}/train
        --val-dataset {{.DATASET}}/val
    generates:
      - checkpoints/best_model.pth
      - checkpoints/training_log.json

  train-arcface:
    desc: "Train ArcFace embedder (metric learning)"
    deps: [prepare]
    cmds:
      - >-
        {{.VENV}}/python training/train_embedder.py
        --mode arcface
        --dataset {{.DATASET}}/train
        --val-dataset {{.DATASET}}/val
        --epochs 40
        --batch-size 256
        --m-per-class 4
        --num-workers 4
    generates:
      - checkpoints/best_model.pth
      - checkpoints/training_log.json

  augment:
    desc: "Generate augmented images for training coins"
    cmds:
      - "{{.VENV}}/python training/augment_synthetic.py --coin-ids 135 111 159 87 226447 --target-per-class 50"

  # ⚠️ Tasks below intentionally have NO `deps: [train]`.
  # In practice training is launched via the admin /training UI (which lets
  # you stage classes, pick aug_recipe overrides, etc.) — auto-running the
  # default `train` task here would overwrite the user's arcface checkpoint
  # with a classify-mode one. Run `train` / `train-arcface` explicitly when
  # you want a fresh checkpoint.

  evaluate:
    desc: Evaluate Recall@1/3 on the test set (requires existing best_model.pth)
    cmds:
      - "{{.VENV}}/python eval/evaluate.py"

  visualize:
    desc: Generate t-SNE plot and training curves (requires existing best_model.pth)
    cmds:
      - "{{.VENV}}/python eval/visualize.py"
    generates:
      - output/tsne_plot.png
      - output/training_curves.png

  export:
    desc: Export PyTorch model to TFLite (requires existing best_model.pth)
    cmds:
      - "{{.VENV}}/python training/export_tflite.py"
    generates:
      - output/eurio_embedder_v1.tflite

  validate:
    desc: Verify TFLite output matches PyTorch (cosine sim > 0.99) — requires prior `export`
    cmds:
      - "{{.VENV}}/python training/validate_export.py"

  validate-per-class:
    desc: "Per-class R@1 over 50 fresh augmentations — same eval as the runner's step 5"
    cmds:
      - "{{.VENV}}/python training/validate_per_class.py {{.CLI_ARGS}}"

  embeddings:
    desc: Compute reference centroid embeddings per coin class (requires existing best_model.pth)
    cmds:
      - "{{.VENV}}/python training/compute_embeddings.py"
    generates:
      - output/embeddings_v1.json
      - output/coin_embeddings.json

  deploy:
    desc: Copy TFLite model and metadata into Android assets
    cmds:
      - mkdir -p {{.ASSETS}}/models {{.ASSETS}}/data
      - /bin/cp {{.OUTPUT}}/eurio_embedder_v1.tflite {{.ASSETS}}/models/
      - /bin/cp {{.OUTPUT}}/model_meta.json {{.ASSETS}}/data/
      - "[ -f {{.OUTPUT}}/coin_embeddings.json ] && /bin/cp {{.OUTPUT}}/coin_embeddings.json {{.ASSETS}}/data/ || true"

  seed:
    desc: Seed Supabase with coin catalog and embeddings (needs SERVICE_ROLE_KEY)
    deps: [embeddings]
    cmds:
      - "{{.VENV}}/python bootstrap/seed_supabase.py"

  # ---------- Utilities ----------
  clean:
    desc: Remove generated artifacts (checkpoints, output, split dataset)
    cmds:
      - rm -rf {{.CHECKPOINTS}} {{.OUTPUT}} {{.DATASET}}

  sync-supabase:
    desc: "Push the canonical referential JSON to Supabase (coins, source_observations, coin_market_prices, …)"
    cmds:
      - "{{.VENV}}/python -m export.sync_to_supabase {{.CLI_ARGS}}"

  sync-supabase-dry:
    desc: "Preview the sync (counts only, no HTTP)"
    cmds:
      - "{{.VENV}}/python -m export.sync_to_supabase --dry-run"

  enrich-numista:
    desc: "Enrich referential with Numista IDs (hardcoded 5 ML coins)"
    cmds:
      - "{{.VENV}}/python referential/enrich_from_numista.py"

  enrich-numista-dry:
    desc: "Preview Numista enrichment without writing"
    cmds:
      - "{{.VENV}}/python referential/enrich_from_numista.py --dry-run"

  batch-match:
    desc: "Batch-match coin_catalog.json 2EUR types to referential (0 API calls)"
    cmds:
      - "{{.VENV}}/python referential/batch_match_numista.py --review"

  batch-match-dry:
    desc: "Preview batch matching without writing"
    cmds:
      - "{{.VENV}}/python referential/batch_match_numista.py --dry-run --review"

  batch-images:
    desc: "Fetch/resize/upload images for all coins with numista_id but no images"
    cmds:
      - "{{.VENV}}/python referential/batch_fetch_images.py"

  batch-images-dry:
    desc: "Preview batch image fetch"
    cmds:
      - "{{.VENV}}/python referential/batch_fetch_images.py --dry-run"

  import-numista:
    desc: "Import all 2 euro coins from Numista API (metadata + images)"
    cmds:
      - "{{.VENV}}/python referential/import_numista.py"

  import-numista-dry:
    desc: "Preview Numista import without downloading"
    cmds:
      - "{{.VENV}}/python referential/import_numista.py --dry-run"

  # ---------- Market & editorial scrapes ----------
  scrape-ebay:
    desc: "Enrich referential with eBay market prices (passes through CLI args, e.g. --countries=FR,DE --limit 5)"
    cmds:
      - "{{.VENV}}/python market/scrape_ebay.py {{.CLI_ARGS}}"

  scrape-lmdlp:
    desc: "Scrape La Maison de la Pièce 2€ catalogue → ml/datasets/sources/lmdlp_<date>.json"
    cmds:
      - "{{.VENV}}/python referential/scrape_lmdlp.py"

  scrape-mdp:
    desc: "Scrape Monnaie de Paris 2€ catalogue → ml/datasets/sources/mdp_<date>.json"
    cmds:
      - "{{.VENV}}/python referential/scrape_monnaiedeparis.py"

  scrape-bce:
    desc: "Scrape BCE commémo announcements 2004→current year → ml/datasets/sources/bce_comm_<year>_<date>.html"
    cmds:
      - "{{.VENV}}/python referential/scrape_bce_images.py"

  fetch-bce-images:
    desc: "Download + upload BCE coin images (always — coexists with Numista)"
    cmds:
      - "{{.VENV}}/python referential/fetch_bce_images.py {{.CLI_ARGS}}"

  migrate-storage-layout:
    desc: "One-shot: migrate coin-images bucket to per-eurio_id layout (--plan / --apply / --apply --prune)"
    cmds:
      - "{{.VENV}}/python -m bootstrap.migrate_storage_layout {{.CLI_ARGS}}"

  # ---------- Detection (YOLOv8-nano) ----------
  detect-setup:
    desc: "Download and prepare coin detection dataset"
    cmds:
      - "{{.VENV}}/python training/setup_detection_dataset.py"

  detect-train:
    desc: "Train YOLOv8-nano coin detector"
    cmds:
      - "{{.VENV}}/python training/train_detector.py --export"

  detect-validate:
    desc: "Validate trained detector"
    cmds:
      - "{{.VENV}}/python training/train_detector.py --validate"

  detect-export:
    desc: "Export detector to TFLite only"
    cmds:
      - "{{.VENV}}/python training/train_detector.py --export-only"

  migrate-dirs:
    desc: "Rename dataset dirs from slug names to Numista IDs"
    cmds:
      - "{{.VENV}}/python bootstrap/rename_to_numista_ids.py"

  # ---------- Training state (SQLite) ----------
  export-state-lite:
    desc: "Export training state DB only (portable history/staging) → tar.gz in CWD"
    cmds:
      - "{{.VENV}}/python -m state.archive export --mode lite {{.CLI_ARGS}}"

  export-state-full:
    desc: "Export state + datasets + checkpoints + embeddings → tar.gz (500MB-1GB)"
    cmds:
      - "{{.VENV}}/python -m state.archive export --mode full {{.CLI_ARGS}}"

  import-state:
    desc: "Import a state tarball. Usage: go-task ml:import-state -- path.tar.gz"
    cmds:
      - "{{.VENV}}/python -m state.archive import {{.CLI_ARGS}}"

  prune-history:
    desc: "Keep only the last N runs. Usage: go-task ml:prune-history -- --keep-last 100"
    cmds:
      - "{{.VENV}}/python -m state.archive prune {{.CLI_ARGS}}"

  # ---------- API quotas ----------
  quota:status:
    desc: "Dump quota usage as JSON. Usage: go-task ml:quota:status -- --source=numista"
    cmds:
      - "{{.VENV}}/python -m api_quota_cli {{.CLI_ARGS}}"

  # ---------- ML API ----------
  api:
    desc: "Start the ML training API (FastAPI on port 8042)"
    cmds:
      - "{{.VENV}}/python -m uvicorn api.server:app --port 8042 --reload"

  api-prod:
    desc: "Start the ML API without reload"
    cmds:
      - "{{.VENV}}/python -m uvicorn api.server:app --port 8042"

  # ---------- Confusion Map ----------
  confusion-map:
    desc: "Generate coin confusion map via DINOv2 and upsert to Supabase"
    cmds:
      - "{{.VENV}}/python eval/confusion_map.py"

  confusion-map-dry:
    desc: "Dry-run confusion map computation (no DB writes)"
    cmds:
      - "{{.VENV}}/python eval/confusion_map.py --dry-run"

  # ---------- Design Groups ----------
  bootstrap-design-groups:
    desc: "Bootstrap design_groups + populate coins.design_group_id (axis A auto, axis B seed)"
    cmds:
      - "{{.VENV}}/python bootstrap/bootstrap_design_groups.py --apply"

  bootstrap-design-groups-dry:
    desc: "Preview design_groups bootstrap without writing"
    cmds:
      - "{{.VENV}}/python bootstrap/bootstrap_design_groups.py"

  # ---------- Phase 2 Augmentation ----------
  augment-preview:
    desc: "Generate a preview grid of augmented images for a design (takes --design-group-id or --eurio-id)"
    cmds:
      - "{{.VENV}}/python eval/preview_augmentations.py {{.CLI_ARGS}}"

  augment-textures-check:
    desc: "Validate that overlay textures are present and readable"
    cmds:
      - "{{.VENV}}/python -c 'from augmentations.overlays import sanity_check_textures; import sys; sys.exit(sanity_check_textures())'"

  augment-textures-generate:
    desc: "Procedurally (re)generate overlay textures (patina/dust/scratches/fingerprints)"
    cmds:
      - "{{.VENV}}/python training/generate_overlay_textures.py {{.CLI_ARGS}}"

  # ---------- PRD Bloc 3 — Real-photo benchmark ----------
  benchmark:
    desc: "Run a benchmark against real photos. Usage: go-task ml:benchmark -- --model <path> [--zones green,orange] [--eurio-ids …]"
    cmds:
      - "{{.VENV}}/python eval/evaluate_real_photos.py {{.CLI_ARGS}}"

  benchmark:photos:check:
    desc: "Validate structure of ml/data/real_photos/ and regenerate _manifest.json"
    cmds:
      - "{{.VENV}}/python eval/check_real_photos.py {{.CLI_ARGS}}"
