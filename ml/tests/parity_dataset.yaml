# Parity dataset manifest — Phase B
#
# Used by ml/tests/measure_parity_baseline.py and (later) ml/tests/parity_test.py.
# All entries reference ml/datasets/<numista_id>/obverse.jpg. No on-device capture
# needed; the test compares two normalizers on the same input image.
#
# Stratification reality check
# ----------------------------
# The available studio source pool (ml/datasets/) contains only 2 EUR coins
# (684) and 4 specific 1 EUR (Italy/Germany/Portugal/Spain). All are physically
# bimetal. The original parity-contract.md §"Dataset D_studio" budget asked for
# "8 mono-métal commun (1c, 2c, 5c, …)" — those copper/yellow mono-metal coins
# are not in this dataset at all. We therefore replace the mono-metal stratum
# with a "bimetal_stable" stratum (coins where Hough wr_1024_tightR happens to
# land on the outer rim, i.e. behaves "like mono-metal" from the algo POV).
# The mismatch with the original spec is intentional and documented here.
#
# Tags used
# ---------
#   training        — coin is part of the eurio-poc training class_manifest.json
#   bimetal_stable  — Hough wr_1024_tightR consistently picks the outer rim on
#                     this coin (validated by Phase A bench: |Δr| ≤ 8 vs
#                     studio_contour). Stand-in for "mono-metal" stratum.
#   bimetal_trap    — Hough wr_1024_tightR is known to vote the inner ring on
#                     this coin (|Δr| ≥ 30 vs studio_contour, Phase A worst
#                     cases). Critical case for the rework's value claim.
#   commemorative   — non-standard back side
#   standard        — country's "1st map" / "2nd map" reverse
#   low_contrast    — pale silver / coloured / Δ(coin_mean,corner_mean) < 70
#   small_size      — short side < 1200 px (max(w,h) < 1200)
#   large_size      — short side ≥ 2400 px
#   atypical_country — Vatican / Monaco / San Marino / Andorra (unusual
#                      iconography vs the eurozone "block")
#   outlier         — frame quirks: very small or very large coin within the
#                     image, off-centre, ring guide present in source
#
# Multiple tags allowed; the measurement script aggregates per tag.

version: 1
description: |
  Phase B parity dataset for ml/tests/measure_parity_baseline.py and
  ml/tests/parity_test.py. Built on 2026-04-29 from the 23 training IDs
  (eurio-poc/class_manifest.json) plus diversification (atypical countries,
  low-contrast, size outliers).

# 2 EUR standard coins ("mono-metal-equivalent": Hough lands on outer rim).
# All taken from training set.
coins:
  - { numista_id: 64,    tags: [training, standard, bimetal_stable] }     # AT 1st map
  - { numista_id: 9761,  tags: [training, standard, bimetal_stable] }     # AT 2nd map
  - { numista_id: 6292,  tags: [training, standard, bimetal_stable] }     # BE 2nd map p1
  - { numista_id: 6293,  tags: [training, standard, bimetal_stable] }     # BE 2nd map p2
  - { numista_id: 88,    tags: [training, standard, bimetal_stable] }     # ES 1st type 1st map
  - { numista_id: 6364,  tags: [training, standard] }                     # ES 1st type 2nd map (medium-Δr in Phase A: bucket 1800-2400)
  - { numista_id: 10862, tags: [training, standard] }                     # ES 2nd type 2nd map
  - { numista_id: 69470, tags: [training, standard] }                     # ES Felipe VI
  - { numista_id: 104,   tags: [training, standard, bimetal_stable] }     # FR 1st map
  - { numista_id: 6376,  tags: [training, standard, bimetal_stable] }     # FR 2nd map
  - { numista_id: 68395, tags: [training, standard, bimetal_stable] }     # AD standard

  # 2 EUR commemoratives — training subset
