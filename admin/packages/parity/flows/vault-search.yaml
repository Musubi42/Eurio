appId: com.musubi.eurio.qa
env:
  PARITY_ID: vault-search
  PARITY_LABEL: "Coffre — Recherche"
  PARITY_GROUP: Coffre
  PARITY_PHASE: "2"
  PARITY_PROTO_ROUTE: /vault/search
  PARITY_STATE: populated
---
- launchApp
- openLink: "eurio://parity/seed?fixture=populated"
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
- openLink: eurio://scene/vault-search
- assertVisible: ".*"
- takeScreenshot: vault-search
