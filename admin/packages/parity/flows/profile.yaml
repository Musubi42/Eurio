appId: com.musubi.eurio.qa
env:
  PARITY_ID: profile
  PARITY_LABEL: "Profil — Hub"
  PARITY_GROUP: Profil
  PARITY_PHASE: "5"
  PARITY_PROTO_ROUTE: /profile
  PARITY_STATE: profile-demo
---
- launchApp
- openLink: "eurio://parity/seed?fixture=profile-demo"
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
- openLink: eurio://scene/profile
- assertVisible: ".*"
- takeScreenshot: profile
