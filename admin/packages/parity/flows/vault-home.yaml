appId: com.musubi.eurio.qa
env:
  PARITY_ID: vault-home
  PARITY_LABEL: "Coffre — Mes pièces"
  PARITY_GROUP: Coffre
  PARITY_PHASE: "2"
  PARITY_PROTO_ROUTE: /vault
  PARITY_STATE: populated
---
- launchApp
- openLink: "eurio://parity/seed?fixture=populated"
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
- openLink: eurio://scene/vault-home
- assertVisible: "Coffre"
- takeScreenshot: vault-home
