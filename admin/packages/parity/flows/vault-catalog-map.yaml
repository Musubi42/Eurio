appId: com.musubi.eurio.qa
env:
  PARITY_ID: vault-catalog-map
  PARITY_LABEL: "Coffre — Catalogue map"
  PARITY_GROUP: "Coffre Catalogue"
  PARITY_PHASE: "4"
  PARITY_PROTO_ROUTE: /vault/catalog
  PARITY_STATE: populated
---
- launchApp
- openLink: "eurio://parity/seed?fixture=populated"
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
- openLink: eurio://scene/vault-catalog-map
- assertVisible: ".*"
- takeScreenshot: vault-catalog-map
