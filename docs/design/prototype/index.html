<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Eurio · prototype</title>
  <meta name="description" content="Prototype navigable Eurio — scan-first numismatique europeenne."/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>

  <!-- Order matters : fonts → tokens → components → shell -->
  <link rel="stylesheet" href="_shared/fonts.css"/>
  <link rel="stylesheet" href="_shared/tokens.css"/>
  <link rel="stylesheet" href="_shared/components.css"/>
  <link rel="stylesheet" href="_shared/shell.css"/>
</head>
<body>
  <div class="stage">
    <div class="device" role="application" aria-label="Eurio prototype device">
      <div class="screen" data-chrome="dark">

        <!-- Status bar (mock) -->
        <div class="statusbar" aria-hidden="true">
          <span>9:41</span>
          <div class="statusbar__right">
            <!-- signal -->
            <svg width="18" height="11" viewBox="0 0 18 11" fill="currentColor" aria-hidden="true">
              <rect x="0" y="7" width="3" height="4" rx="0.5"/>
              <rect x="5" y="5" width="3" height="6" rx="0.5"/>
              <rect x="10" y="2" width="3" height="9" rx="0.5"/>
              <rect x="15" y="0" width="3" height="11" rx="0.5" opacity="0.45"/>
            </svg>
            <!-- wifi -->
            <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor" aria-hidden="true">
              <path d="M8 11 L5.5 8.5 A3.5 3.5 0 0 1 10.5 8.5 Z"/>
              <path d="M8 6.5 A5.8 5.8 0 0 0 3 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M8 3.5 A9 9 0 0 0 0.5 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
            </svg>
            <!-- battery -->
            <svg width="25" height="11" viewBox="0 0 25 11" fill="none" aria-hidden="true">
              <rect x="0.5" y="0.5" width="21" height="10" rx="2.5" stroke="currentColor"/>
              <rect x="23" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/>
              <rect x="2" y="2" width="18" height="7" rx="1.2" fill="currentColor"/>
            </svg>
          </div>
        </div>

        <!-- Version badge (7-tap to toggle DebugState) -->
        <button type="button" class="version-badge" data-debug="off" aria-label="Version v0.1.0, tape 7 fois pour le mode developpeur">
          <span>v0.1.0</span>
          <span class="version-badge__led" aria-hidden="true"></span>
        </button>

        <!-- Scene viewport — populated by router.js -->
        <main id="view" aria-live="polite"></main>

        <!-- Bottom navigation -->
        <nav class="bottomnav" aria-label="Navigation principale">
          <button type="button" class="bottomnav__tab" data-nav="vault" onclick="location.hash='#/vault'">
            <span class="bottomnav__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="18" height="14" rx="2"/>
                <path d="M3 9h18"/>
                <circle cx="8" cy="14" r="1.4"/>
              </svg>
            </span>
            <span class="bottomnav__label">Coffre</span>
          </button>

          <button type="button" class="bottomnav__tab bottomnav__tab--scan" data-nav="scan" onclick="location.hash='#/scan'" aria-label="Scanner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
              <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
              <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
              <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
              <circle cx="12" cy="12" r="4"/>
            </svg>
          </button>

          <button type="button" class="bottomnav__tab" data-nav="profile" onclick="location.hash='#/profile'">
            <span class="bottomnav__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="9" r="3.5"/>
                <path d="M5 20c1.5-3.5 4.2-5 7-5s5.5 1.5 7 5"/>
              </svg>
            </span>
            <span class="bottomnav__label">Profil</span>
          </button>

          <button type="button" class="bottomnav__tab bottomnav__tab--soon" data-nav="marketplace" onclick="location.hash='#/marketplace'">
            <span class="bottomnav__soon-badge">Bientôt</span>
            <span class="bottomnav__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 7h16l-1.3 10.2a2 2 0 0 1-2 1.8H7.3a2 2 0 0 1-2-1.8L4 7Z"/>
                <path d="M9 7V5a3 3 0 0 1 6 0v2"/>
              </svg>
            </span>
            <span class="bottomnav__label">Marché</span>
          </button>
        </nav>

        <!-- Home indicator -->
        <div class="home-indicator" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <script type="module" src="_shared/router.js"></script>
</body>
</html>
