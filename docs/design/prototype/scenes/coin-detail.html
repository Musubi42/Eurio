<!--
  Scene : coin-detail
  -------------------
  Vue unique paramétrée par un contexte (`?ctx=scan|owned|reference`).
  Le sidecar `coin-detail.js` lit les params, récupère le coin via
  `data.getCoin(params.eurioId)` (fallback `data.randomCoin()`), puis
  re-rend tout le contenu dans `[data-slot]` en passant les sections à
  afficher / masquer selon le contexte.

  - Zero inline CSS colours, zero font-family hardcoded.
  - Styles scoped under .coin-detail-*.
-->

<style>
  .coin-detail-root {
    position: absolute;
    inset: 0;
    background: var(--surface);
    color: var(--ink);
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: 120px; /* sticky CTA clearance */
    -webkit-overflow-scrolling: touch;
  }

  /* ───────── Top bar ───────── */
  .coin-detail-topbar {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 52px var(--space-4) var(--space-3);
    background: linear-gradient(180deg, var(--surface) 85%, rgba(250,250,248,0) 100%);
  }
  .coin-detail-topbar__back,
  .coin-detail-topbar__more {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-full);
    background: var(--surface-1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    border: 1px solid var(--gray-100);
  }
  .coin-detail-topbar__title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: var(--tracking-eyebrow);
    text-transform: uppercase;
    color: var(--ink-400);
  }

  /* ───────── Hero ───────── */
  .coin-detail-hero {
    position: relative;
    padding: var(--space-4) var(--space-5) var(--space-6);
    min-height: 300px;
  }
  .coin-detail-hero[data-ctx="reference"] {
    padding-top: var(--space-8);
    padding-bottom: var(--space-9);
    text-align: center;
  }
  .coin-detail-hero__gold-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: var(--radius-full);
    background: linear-gradient(180deg, var(--gold-300), var(--gold));
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    box-shadow: 0 4px 14px rgba(200,168,100,0.35), var(--inner-highlight-gold);
    margin-bottom: var(--space-4);
  }
  .coin-detail-hero__photos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-4);
    align-items: start;
  }
  .coin-detail-hero[data-ctx="reference"] .coin-detail-hero__photos {
    grid-template-columns: 1fr;
    max-width: 260px;
    margin: 0 auto;
  }
  .coin-detail-photo {
    position: relative;
    aspect-ratio: 1;
    border-radius: var(--radius-lg);
    background: linear-gradient(135deg, var(--indigo-800), var(--indigo-900));
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-3);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .coin-detail-photo__label {
    position: absolute;
    top: 8px;
    left: 10px;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  .coin-detail-photo--user {
    background: linear-gradient(135deg, var(--gray-700), var(--gray-900));
    filter: grayscale(1);
  }
  .coin-detail-photo--user .coin-svg {
    opacity: 0.85;
  }
  .coin-detail-photo--reference {
    background: radial-gradient(ellipse 80% 60% at 40% 35%, var(--indigo-600), var(--indigo-900));
  }
  .coin-detail-photo .coin-svg {
    width: 85%;
    height: 85%;
  }

  /* Ownership strip (owned only) */
  .coin-detail-ownership {
    display: flex;
    gap: var(--space-4);
    margin-top: var(--space-4);
    padding: var(--space-3) var(--space-4);
    background: var(--surface-1);
    border-radius: var(--radius-md);
    border: 1px solid var(--gray-100);
  }
  .coin-detail-ownership .stat-label { font-size: 9px; }
  .coin-detail-ownership .stat-value {
    font-family: var(--font-ui);
    font-size: var(--text-sm);
    font-weight: 600;
  }
  .coin-detail-ownership .stat-value--delta-up { color: var(--success); }
  .coin-detail-ownership .stat-value--delta-down { color: var(--danger); }

  /* Face toggle pills */
  .coin-detail-face-toggle {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: rgba(14,14,31,0.06);
    border-radius: var(--radius-full);
    margin-top: var(--space-4);
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }
  .coin-detail-face-toggle button {
    padding: 6px 16px;
    border-radius: var(--radius-full);
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--ink-400);
  }
  .coin-detail-face-toggle button[aria-selected="true"] {
    background: var(--surface);
    color: var(--ink);
    box-shadow: var(--shadow-sm);
  }
  .coin-detail-face-toggle button[disabled] {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ───────── Sections (museum card) ───────── */
  .coin-detail-section {
    padding: var(--space-6) var(--space-5);
    border-top: 1px solid rgba(14,14,31,0.08);
  }
  .coin-detail-section__head {
    display: flex;
    align-items: baseline;
    gap: var(--space-3);
    margin-bottom: var(--space-4);
  }
  .coin-detail-section__num {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.18em;
  }
  .coin-detail-section__title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: var(--tracking-eyebrow);
    text-transform: uppercase;
    color: var(--ink-400);
  }

  /* 01 Identité */
  .coin-detail-identity__value {
    font-family: var(--font-display);
    font-style: italic;
    font-size: var(--text-hero);
    line-height: var(--leading-tight);
    font-weight: 400;
    color: var(--ink);
    letter-spacing: var(--tracking-tight);
  }
  .coin-detail-identity__meta {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    margin-top: var(--space-2);
    font-size: var(--text-sm);
    color: var(--ink-500);
  }
  .coin-detail-identity__theme {
    margin-top: var(--space-3);
    font-family: var(--font-display);
    font-style: italic;
    font-size: var(--text-lg);
    color: var(--ink);
    line-height: var(--leading-snug);
  }
  .coin-detail-identity__rarity {
    margin-top: var(--space-4);
  }

  /* 02 Valorisation */
  .coin-detail-valuation {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: var(--space-3);
  }
  .coin-detail-pct {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: var(--space-3);
    background: var(--surface-1);
    border-radius: var(--radius-md);
    border: 1px solid var(--gray-100);
  }
  .coin-detail-pct--median {
    background: linear-gradient(180deg, rgba(200,168,100,0.14), rgba(200,168,100,0.06));
    border-color: rgba(200,168,100,0.35);
  }
  .coin-detail-pct__label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-400);
  }
  .coin-detail-pct--median .coin-detail-pct__label { color: var(--gold-deep); }
  .coin-detail-pct__value {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-size: var(--text-xl);
    font-weight: 500;
    color: var(--ink);
  }
  .coin-detail-valuation__delta {
    margin-top: var(--space-3);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-variant-numeric: tabular-nums;
    color: var(--ink-400);
  }
  .coin-detail-valuation__delta--up { color: var(--success); }
  .coin-detail-valuation__delta--down { color: var(--danger); }
  .coin-detail-empty {
    padding: var(--space-5);
    text-align: center;
    font-family: var(--font-display);
    font-style: italic;
    font-size: var(--text-sm);
    color: var(--ink-400);
    background: var(--surface-1);
    border-radius: var(--radius-md);
    border: 1px dashed var(--gray-200);
  }

  /* 03 Historique sparkline */
  .coin-detail-spark {
    display: block;
    width: 100%;
    height: 90px;
  }
  .coin-detail-spark path.line {
    fill: none;
    stroke: var(--indigo-700);
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .coin-detail-spark path.fill {
    fill: rgba(26,27,75,0.08);
    stroke: none;
  }
  .coin-detail-spark circle.point {
    fill: var(--gold);
    stroke: var(--surface);
    stroke-width: 2;
  }
  .coin-detail-history__stats {
    display: flex;
    gap: var(--space-4);
    margin-top: var(--space-3);
  }
  .coin-detail-history__extend {
    margin-top: var(--space-3);
    padding: 10px 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--gray-200);
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--ink-500);
    background: var(--surface);
    width: 100%;
  }

  /* 04 Projection */
  .coin-detail-projection {
    padding: var(--space-5);
    border-radius: var(--radius-lg);
    background: linear-gradient(135deg, var(--indigo-700), var(--indigo-800));
    color: var(--surface);
    box-shadow: var(--shadow-indigo);
  }
  .coin-detail-projection__label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .coin-detail-projection__range {
    margin-top: var(--space-2);
    font-family: var(--font-display);
    font-style: italic;
    font-size: var(--text-2xl);
    font-variant-numeric: tabular-nums;
  }
  .coin-detail-projection__disclaimer {
    margin-top: var(--space-3);
    font-family: var(--font-display);
    font-style: italic;
    font-size: var(--text-xs);
    color: rgba(255,255,255,0.55);
  }

  /* 05 Sets */
  .coin-detail-set {
    display: block;
    padding: var(--space-3) 0;
    border-bottom: 1px solid rgba(14,14,31,0.06);
  }
  .coin-detail-set:last-child { border-bottom: 0; }
  .coin-detail-set__head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .coin-detail-set__name {
    font-family: var(--font-display);
    font-style: italic;
    font-size: var(--text-base);
    color: var(--ink);
  }
  .coin-detail-set__count {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-variant-numeric: tabular-nums;
    color: var(--ink-400);
  }

  /* 06 Details + common */
  .coin-detail-dl {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: var(--space-3) var(--space-4);
  }
  .coin-detail-dl dt {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-400);
  }
  .coin-detail-dl dd {
    font-size: var(--text-sm);
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .coin-detail-description {
    margin-top: var(--space-3);
    font-size: var(--text-sm);
    line-height: var(--leading-base);
    color: var(--ink-700);
  }
  .coin-detail-common {
    margin-top: var(--space-5);
    padding: var(--space-4);
    border-radius: var(--radius-md);
    background: var(--surface-1);
    border: 1px solid var(--gray-100);
  }
  .coin-detail-common__title {
    font-family: var(--font-display);
    font-style: italic;
    font-size: var(--text-base);
    margin-bottom: var(--space-2);
    color: var(--ink);
  }
  .coin-detail-common__flags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: var(--space-3);
  }
  .coin-detail-common__flag {
    padding: 4px 10px;
    border-radius: var(--radius-full);
    background: var(--surface);
    border: 1px solid var(--gray-100);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink);
  }

  /* ───────── CTA bar ───────── */
  .coin-detail-cta {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: var(--space-4) var(--space-5) calc(var(--space-5) + 24px);
    background: linear-gradient(180deg, rgba(250,250,248,0) 0%, var(--surface) 30%);
    z-index: 6;
  }
  .coin-detail-cta .btn { width: 100%; }
  .coin-detail-cta__confirm {
    display: none;
    gap: var(--space-2);
    padding: var(--space-3);
    background: var(--surface-1);
    border-radius: var(--radius-md);
    border: 1px solid var(--danger-soft);
    margin-bottom: var(--space-2);
    font-size: var(--text-xs);
    color: var(--ink-700);
    flex-direction: column;
  }
  .coin-detail-cta__confirm[data-open="true"] { display: flex; }
  .coin-detail-cta__confirm-actions { display: flex; gap: var(--space-2); }
  .coin-detail-cta__confirm-actions .btn { flex: 1; min-height: 38px; padding: 8px 12px; }

  /* ───────── Toast ───────── */
  .coin-detail-toast {
    position: fixed;
    left: 50%;
    bottom: 140px;
    transform: translateX(-50%) translateY(20px);
    padding: 12px 18px;
    background: var(--ink);
    color: var(--surface);
    border-radius: var(--radius-full);
    font-size: var(--text-xs);
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--duration-base) var(--ease-out),
                transform var(--duration-base) var(--ease-out);
    z-index: var(--z-toast);
  }
  .coin-detail-toast[data-open="true"] {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>

<section class="coin-detail-root" data-scene="coin-detail">
  <!-- Top bar -->
  <div class="coin-detail-topbar">
    <button type="button" class="coin-detail-topbar__back" data-action="back" aria-label="Retour">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <div class="coin-detail-topbar__title" data-slot="topbar-title">Fiche pièce</div>
    <button type="button" class="coin-detail-topbar__more" aria-label="Plus d'options">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/>
      </svg>
    </button>
  </div>

  <!-- Hero -->
  <div class="coin-detail-hero" data-slot="hero"></div>

  <!-- 01 Identité -->
  <section class="coin-detail-section">
    <div class="coin-detail-section__head">
      <span class="coin-detail-section__num">01</span>
      <span class="coin-detail-section__title">Identité</span>
    </div>
    <div data-slot="identity"></div>
  </section>

  <!-- 02 Valorisation -->
  <section class="coin-detail-section">
    <div class="coin-detail-section__head">
      <span class="coin-detail-section__num">02</span>
      <span class="coin-detail-section__title">Valorisation marché</span>
    </div>
    <div data-slot="valuation"></div>
  </section>

  <!-- 03 Historique -->
  <section class="coin-detail-section">
    <div class="coin-detail-section__head">
      <span class="coin-detail-section__num">03</span>
      <span class="coin-detail-section__title">Historique de prix</span>
    </div>
    <div data-slot="history"></div>
  </section>

  <!-- 04 Projection -->
  <section class="coin-detail-section" data-slot-wrap="projection">
    <div class="coin-detail-section__head">
      <span class="coin-detail-section__num">04</span>
      <span class="coin-detail-section__title">Projection 5 ans</span>
    </div>
    <div data-slot="projection"></div>
  </section>

  <!-- 05 Sets liés -->
  <section class="coin-detail-section">
    <div class="coin-detail-section__head">
      <span class="coin-detail-section__num">05</span>
      <span class="coin-detail-section__title">Sets liés</span>
    </div>
    <div data-slot="sets"></div>
  </section>

  <!-- 06 Détails -->
  <section class="coin-detail-section">
    <div class="coin-detail-section__head">
      <span class="coin-detail-section__num">06</span>
      <span class="coin-detail-section__title">Détails</span>
    </div>
    <div data-slot="details"></div>
  </section>

  <!-- CTA sticky -->
  <div class="coin-detail-cta" data-slot="cta"></div>

  <!-- Toast -->
  <div class="coin-detail-toast" data-slot="toast" role="status" aria-live="polite"></div>
</section>
