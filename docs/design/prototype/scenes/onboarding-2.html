<!--
  Scene : onboarding-2 (vault preview)
  ------------------------------------
  Step 2 of 3. "À quoi ressemblera ton coffre."
  A FAKE vault preview : must be unmistakably an example.
  We mark it with :
    - a gold "Exemple" eyebrow + dashed border on the card
    - a subtle diagonal "aperçu" watermark
    - copy : "Voilà à quoi ça ressemblera quand tu l'auras rempli."
-->

<style>
  /* Full-bleed via route chrome:'none' (handled by shell.css). */
  .onboarding-2-root {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(ellipse 90% 55% at 50% 25%, var(--indigo-500) 0%, transparent 70%),
      var(--indigo-800);
    color: var(--surface);
    padding: 52px 24px 32px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .onboarding-2-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-6);
    flex-shrink: 0;
  }
  .onboarding-2-brand {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    color: var(--surface);
  }
  .onboarding-2-brand em { font-style: italic; color: var(--gold); }
  .onboarding-2-skip {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.85);
    padding: 8px 16px;
    border-radius: var(--radius-full);
    font-size: var(--text-xs);
    font-weight: 500;
    min-height: 36px;
    backdrop-filter: blur(8px);
  }

  /* Fake vault card */
  .onboarding-2-preview {
    position: relative;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
    border: 1px dashed rgba(200,168,100,0.45);
    border-radius: var(--radius-xl);
    padding: var(--space-5);
    margin-bottom: var(--space-6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    flex-shrink: 0;
  }
  .onboarding-2-example-tag {
    position: absolute;
    top: -10px;
    left: 20px;
    background: var(--indigo-800);
    padding: 2px 10px;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px dashed rgba(200,168,100,0.45);
    border-radius: var(--radius-full);
  }

  .onboarding-2-preview__label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: var(--tracking-eyebrow);
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: var(--space-2);
  }
  .onboarding-2-preview__total {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 44px;
    font-weight: 400;
    color: var(--surface);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .onboarding-2-preview__delta {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-left: var(--space-3);
    padding: 3px 9px;
    background: var(--success-soft);
    color: var(--success);
    border-radius: var(--radius-full);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    vertical-align: middle;
  }

  .onboarding-2-stats {
    display: flex;
    gap: 0;
    margin-top: var(--space-4);
    padding-top: var(--space-4);
    border-top: 1px dashed rgba(200,168,100,0.25);
  }
  .onboarding-2-stat {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-left: var(--space-3);
  }
  .onboarding-2-stat + .onboarding-2-stat {
    border-left: 1px solid rgba(255,255,255,0.1);
  }
  .onboarding-2-stat:first-child { padding-left: 0; }
  .onboarding-2-stat__value {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: 400;
    color: var(--surface);
    line-height: 1;
  }
  .onboarding-2-stat__label {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.45);
  }

  .onboarding-2-recent {
    flex-shrink: 0;
    margin-bottom: var(--space-5);
  }
  .onboarding-2-recent__label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: var(--tracking-eyebrow);
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: var(--space-3);
  }
  .onboarding-2-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-3);
  }
  .onboarding-2-cell {
    aspect-ratio: 1;
    background:
      radial-gradient(circle at 35% 32%, var(--gold-300) 0%, var(--gold) 45%, var(--gold-700) 85%, var(--gold-deep) 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 0 1px rgba(200,168,100,0.35),
      0 6px 14px rgba(0,0,0,0.35),
      inset 0 1px 0 rgba(255,230,170,0.45),
      inset 0 -4px 8px rgba(0,0,0,0.22);
    position: relative;
  }
  .onboarding-2-cell__flag {
    position: absolute;
    top: 4px;
    right: 4px;
    font-size: 12px;
    line-height: 1;
  }
  .onboarding-2-cell__value {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 18px;
    color: var(--indigo-900);
    font-weight: 500;
  }
  .onboarding-2-cell__value--sm { font-size: 13px; }

  .onboarding-2-pager {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: var(--space-4);
  }
  .onboarding-2-pager span {
    width: 18px;
    height: 2px;
    background: rgba(255,255,255,0.18);
  }
  .onboarding-2-pager span[data-active="true"] {
    background: var(--gold);
    width: 28px;
  }

  .onboarding-2-copy {
    text-align: center;
    margin-bottom: var(--space-6);
    flex-shrink: 0;
  }
  .onboarding-2-copy .eyebrow {
    color: rgba(255,255,255,0.5);
    display: block;
    margin-bottom: var(--space-3);
  }
  .onboarding-2-copy h1 {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: 30px;
    line-height: 1.1;
    color: var(--surface);
    letter-spacing: -0.02em;
    margin-bottom: var(--space-3);
  }
  .onboarding-2-copy p {
    font-size: var(--text-sm);
    color: rgba(255,255,255,0.62);
    max-width: 310px;
    margin: 0 auto;
  }

  .onboarding-2-cta {
    display: flex;
    gap: var(--space-3);
    flex-shrink: 0;
  }
  .onboarding-2-back {
    flex: 0 0 48px;
    height: 48px;
    border-radius: var(--radius-full);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.85);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: var(--text-lg);
  }
  .onboarding-2-cta .btn-gold {
    flex: 1;
    padding: 16px 20px;
    font-size: var(--text-base);
    border-radius: var(--radius-lg);
  }
</style>

<section class="onboarding-2-root" data-scene="onboarding-2">
  <header class="onboarding-2-topbar">
    <div class="onboarding-2-brand">Eur<em>io</em></div>
    <button type="button" class="onboarding-2-skip" data-action="skip">Passer</button>
  </header>

  <div class="onboarding-2-preview" aria-label="Aperçu non réel du futur coffre">
    <span class="onboarding-2-example-tag">Exemple · aperçu</span>
    <div class="onboarding-2-preview__label">Ton coffre · aperçu</div>
    <div>
      <span class="onboarding-2-preview__total">86,40&nbsp;€</span>
      <span class="onboarding-2-preview__delta">▲ 12&nbsp;%</span>
    </div>

    <div class="onboarding-2-stats">
      <div class="onboarding-2-stat">
        <div class="onboarding-2-stat__value">24</div>
        <div class="onboarding-2-stat__label">Pièces</div>
      </div>
      <div class="onboarding-2-stat">
        <div class="onboarding-2-stat__value">7</div>
        <div class="onboarding-2-stat__label">Pays</div>
      </div>
      <div class="onboarding-2-stat">
        <div class="onboarding-2-stat__value">3</div>
        <div class="onboarding-2-stat__label">Séries</div>
      </div>
    </div>
  </div>

  <div class="onboarding-2-recent">
    <div class="onboarding-2-recent__label">Ajoutées récemment · exemple</div>
    <div class="onboarding-2-grid" aria-hidden="true">
      <div class="onboarding-2-cell"><span class="onboarding-2-cell__flag">🇫🇷</span><span class="onboarding-2-cell__value">2€</span></div>
      <div class="onboarding-2-cell"><span class="onboarding-2-cell__flag">🇩🇪</span><span class="onboarding-2-cell__value">1€</span></div>
      <div class="onboarding-2-cell"><span class="onboarding-2-cell__flag">🇪🇸</span><span class="onboarding-2-cell__value onboarding-2-cell__value--sm">50c</span></div>
      <div class="onboarding-2-cell"><span class="onboarding-2-cell__flag">🇮🇹</span><span class="onboarding-2-cell__value onboarding-2-cell__value--sm">20c</span></div>
      <div class="onboarding-2-cell"><span class="onboarding-2-cell__flag">🇵🇹</span><span class="onboarding-2-cell__value onboarding-2-cell__value--sm">10c</span></div>
      <div class="onboarding-2-cell"><span class="onboarding-2-cell__flag">🇧🇬</span><span class="onboarding-2-cell__value">2€</span></div>
    </div>
  </div>

  <div class="onboarding-2-pager" aria-hidden="true">
    <span></span>
    <span data-active="true"></span>
    <span></span>
  </div>

  <div class="onboarding-2-copy">
    <span class="eyebrow">Étape 2 sur 3</span>
    <h1>À quoi ressemblera ton coffre.</h1>
    <p>Chaque pièce prend place dans ton coffre local. Voilà à quoi ça ressemblera quand tu l'auras rempli.</p>
  </div>

  <div class="onboarding-2-cta">
    <button type="button" class="onboarding-2-back" data-action="back" aria-label="Retour">←</button>
    <button type="button" class="btn btn-gold" data-action="next">
      <span>Suivant</span>
      <span aria-hidden="true">→</span>
    </button>
  </div>
</section>
