<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eurio — Coffre · Grille</title>
<link rel="stylesheet" href="_shared.css">
</head>
<body>
<div class="stage">
  <div class="device">
    <div class="screen">
      <div class="status-bar">
        <span class="time tabular">9:41</span>
        <span class="icons">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M2 12 Q12 2 22 12"/><path d="M5 15 Q12 8 19 15"/><path d="M8 18 Q12 14 16 18"/><circle cx="12" cy="20" r="1" fill="currentColor"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 18h2v-4H2v4zm4 0h2V10H6v8zm4 0h2V6h-2v12zm4 0h2V2h-2v16zm4 0h2v-8h-2v8z"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="8" width="18" height="10" rx="2"/><rect x="4" y="10" width="14" height="6" rx="1" fill="currentColor"/><path d="M22 12v2"/></svg>
        </span>
      </div>

      <div class="content">
        <div class="scroll">
          <div class="vault-header">
            <div class="top-row">
              <span class="eyebrow">Ton coffre</span>
              <div style="display:flex;gap:4px;">
                <button class="icon-btn" aria-label="Export">
                  <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-5-5m5 5l5-5M3 21h18" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button class="icon-btn" aria-label="Plus">
                  <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1.5" fill="currentColor" stroke="none"/></svg>
                </button>
              </div>
            </div>

            <div class="value-block">
              <span class="value-label">Valeur totale</span>
              <div class="value-total tabular">247<span class="euro">€</span></div>
              <div class="delta">
                <span class="chip tabular">
                  <svg viewBox="0 0 24 24"><path d="M7 14l5-5 5 5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  +34%
                </span>
                <span>depuis que tu as commencé</span>
              </div>
            </div>
          </div>

          <div class="stats-strip">
            <div class="stat">
              <span class="stat-val tabular">23</span>
              <span class="stat-label">Pièces</span>
            </div>
            <div class="stat">
              <span class="stat-val tabular">8</span>
              <span class="stat-label">Pays</span>
            </div>
            <div class="stat">
              <span class="stat-val tabular">2</span>
              <span class="stat-label">Séries</span>
            </div>
          </div>

          <div class="toolbar">
            <div class="search-bar">
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5" stroke-linecap="round"/></svg>
              <input placeholder="Chercher dans ton coffre" readonly>
            </div>
            <div class="filter-row">
              <button class="chip-btn">
                <svg viewBox="0 0 24 24"><path d="M4 6h16M7 12h10M10 18h4" stroke-linecap="round"/></svg>
                Filtres
              </button>
              <button class="chip-btn">Pays <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
              <button class="chip-btn">Année <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
              <button class="chip-btn">Rareté <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
              <button class="chip-btn">Type <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            </div>
            <div class="view-toggle">
              <button class="sort-btn">
                Date d'ajout
                <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <div class="segmented">
                <button class="active" aria-label="Grille">
                  <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                </button>
                <button aria-label="Liste">
                  <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg>
                </button>
              </div>
            </div>
          </div>

          <div class="group-header">
            <span class="label">Avril 2026</span>
            <span class="line"></span>
          </div>

          <div class="coin-grid">
            <div class="tile bicolor"><div class="coin-wrap"><div class="coin-disc" data-glyph="2€"></div></div><div class="meta-bar"><span class="flag fr"></span><span class="denom">2 €</span></div></div>
            <div class="tile"><div class="coin-wrap"><div class="coin-disc" data-glyph="50¢"></div></div><div class="meta-bar"><span class="flag de"></span><span class="denom">50 c</span></div></div>
            <div class="tile set-complete"><div class="mult">×2</div><div class="coin-wrap"><div class="coin-disc" data-glyph="20¢"></div></div><div class="meta-bar"><span class="flag fr"></span><span class="denom">20 c</span></div></div>
            <div class="tile copper"><div class="coin-wrap"><div class="coin-disc" data-glyph="5¢"></div></div><div class="meta-bar"><span class="flag it"></span><span class="denom">5 c</span></div></div>
            <div class="tile bicolor"><div class="coin-wrap"><div class="coin-disc" data-glyph="1€"></div></div><div class="meta-bar"><span class="flag es"></span><span class="denom">1 €</span></div></div>
            <div class="tile"><div class="coin-wrap"><div class="coin-disc" data-glyph="10¢"></div></div><div class="meta-bar"><span class="flag pt"></span><span class="denom">10 c</span></div></div>
            <div class="tile bicolor"><div class="mult">×3</div><div class="coin-wrap"><div class="coin-disc" data-glyph="2€"></div></div><div class="meta-bar"><span class="flag de"></span><span class="denom">2 €</span></div></div>
            <div class="tile set-complete"><div class="coin-wrap"><div class="coin-disc" data-glyph="50¢"></div></div><div class="meta-bar"><span class="flag fr"></span><span class="denom">50 c</span></div></div>
            <div class="tile copper"><div class="coin-wrap"><div class="coin-disc" data-glyph="2¢"></div></div><div class="meta-bar"><span class="flag be"></span><span class="denom">2 c</span></div></div>
          </div>

          <div class="group-header">
            <span class="label">Mars 2026</span>
            <span class="line"></span>
          </div>

          <div class="coin-grid">
            <div class="tile set-complete"><div class="coin-wrap"><div class="coin-disc" data-glyph="1€"></div></div><div class="meta-bar"><span class="flag fr"></span><span class="denom">1 €</span></div></div>
            <div class="tile"><div class="coin-wrap"><div class="coin-disc" data-glyph="10¢"></div></div><div class="meta-bar"><span class="flag fr"></span><span class="denom">10 c</span></div></div>
            <div class="tile bicolor"><div class="coin-wrap"><div class="coin-disc" data-glyph="2€"></div></div><div class="meta-bar"><span class="flag gr"></span><span class="denom">2 €</span></div></div>
            <div class="tile copper"><div class="coin-wrap"><div class="coin-disc" data-glyph="1¢"></div></div><div class="meta-bar"><span class="flag nl"></span><span class="denom">1 c</span></div></div>
            <div class="tile"><div class="coin-wrap"><div class="coin-disc" data-glyph="20¢"></div></div><div class="meta-bar"><span class="flag ie"></span><span class="denom">20 c</span></div></div>
            <div class="tile"><div class="coin-wrap"><div class="coin-disc" data-glyph="50¢"></div></div><div class="meta-bar"><span class="flag at"></span><span class="denom">50 c</span></div></div>
          </div>

          <div style="height:120px;"></div>
        </div>

        <div class="bottom-area">
          <nav class="nav">
            <a class="nav-item">
              <svg viewBox="0 0 24 24"><path d="M3 10l9-7 9 7v10a2 2 0 01-2 2h-4v-7h-6v7H5a2 2 0 01-2-2V10z" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Accueil
            </a>
            <a class="nav-item active">
              <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="14" rx="2"/><path d="M8 10h8M8 14h5" stroke-linecap="round"/><circle cx="16" cy="14" r="0.5" fill="currentColor"/></svg>
              Coffre
            </a>
            <div class="nav-spacer"></div>
            <a class="nav-item">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.5 3.5-8 8-8s8 3.5 8 8" stroke-linecap="round"/></svg>
              Profil
            </a>
            <button class="fab" aria-label="Scanner">
              <svg viewBox="0 0 24 24"><path d="M4 7V5a1 1 0 011-1h2M17 4h2a1 1 0 011 1v2M20 17v2a1 1 0 01-1 1h-2M7 20H5a1 1 0 01-1-1v-2" stroke-linecap="round"/><circle cx="12" cy="12" r="3.5"/></svg>
            </button>
          </nav>
        </div>
      </div>
      <div class="home-indicator"></div>
    </div>
  </div>
</div>
</body>
</html>
