appId: com.musubi.eurio
env:
  PARITY_ID: vault-filters
  PARITY_LABEL: "Coffre — Filtres"
  PARITY_GROUP: Coffre
  PARITY_PHASE: "2"
  PARITY_PROTO_ROUTE: /vault/filters
  PARITY_STATE: populated
---
- launchApp
- openLink: "eurio://parity/seed?fixture=populated"
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
- openLink: eurio://scene/vault-filters
- assertVisible: ".*"
- takeScreenshot: vault-filters
