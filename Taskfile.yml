version: '3'

includes:
  android:
    taskfile: ./app-android/Taskfile.yml
    dir: .
  ml:
    taskfile: ./ml/Taskfile.yml
    dir: ./ml

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list-all
    silent: true

  tokens:generate:
    desc: Regenerate Android theme files (Color/Shape/Spacing) from shared/tokens.css
    cmds:
      - node scripts/generate_android_tokens.mjs

  parity:capture-proto:
    desc: Capture proto screenshots via Playwright (requires dev server running)
    cmds:
      - pnpm -C admin/packages/parity capture:proto

  tokens:check:
    desc: Run the token generator and fail if it produces unstaged changes (CI guard)
    cmds:
      - node scripts/generate_android_tokens.mjs
      - git diff --exit-code app-android/src/main/java/com/musubi/eurio/ui/theme/Color.kt app-android/src/main/java/com/musubi/eurio/ui/theme/Shape.kt app-android/src/main/java/com/musubi/eurio/ui/theme/Spacing.kt

  augment-textures-generate:
    desc: Procedurally (re)generate overlay textures (patina/dust/scratches/fingerprints)
    dir: ./ml
    cmds:
      - ./.venv/bin/python training/generate_overlay_textures.py {{.CLI_ARGS}}

  filament:install-matc:
    desc: Download Filament macOS toolchain (matc) into ./tools/filament/. Pinned to v1.71.0 to match the runtime shipped in SceneView 4.0.0.
    vars:
      FILAMENT_VERSION: v1.71.0
    cmds:
      - mkdir -p tools/filament
      - |
        if [ -x tools/filament/bin/matc ]; then
          echo "matc already installed: $(tools/filament/bin/matc --version 2>&1 | head -1)"
          exit 0
        fi
        echo "Downloading filament-{{.FILAMENT_VERSION}}-mac.tgz..."
        curl -L --fail -o tools/filament.tgz \
          https://github.com/google/filament/releases/download/{{.FILAMENT_VERSION}}/filament-{{.FILAMENT_VERSION}}-mac.tgz
        tar -xzf tools/filament.tgz -C tools/filament --strip-components=1
        rm tools/filament.tgz
        echo "matc installed: $(tools/filament/bin/matc --version 2>&1 | head -1)"

  filament:compile-materials:
    desc: Compile *.mat sources in app-android/src/main/materials/ to *.filamat in assets/materials/. Run automatically by Gradle preBuild — invoke manually only when iterating on a material.
    cmds:
      - |
        if [ ! -x tools/filament/bin/matc ]; then
          echo "matc not found. Run: go-task filament:install-matc" >&2
          exit 1
        fi
        mkdir -p app-android/src/main/assets/materials
        for src in app-android/src/main/materials/*.mat; do
          [ -f "$src" ] || continue
          name=$(basename "${src%.mat}")
          out="app-android/src/main/assets/materials/${name}.filamat"
          tools/filament/bin/matc -p mobile -a opengl -o "$out" "$src"
          echo "  $src → $out"
        done

  augment-textures-check:
    desc: Validate that overlay textures are present and readable
    dir: ./ml
    cmds:
      - ./.venv/bin/python -c 'from augmentations.overlays import sanity_check_textures; import sys; sys.exit(sanity_check_textures())'

  loan:build-catalog:
    desc: "Génère catalog.json + télécharge images dans public/coins/ (local only, requires SUPABASE_SERVICE_ROLE_KEY)"
    dir: loan
    cmds:
      - pnpm tsx scripts/build-catalog.ts

  loan:dev:
    desc: "Dev server Next.js pour loan/"
    dir: loan
    cmds:
      - pnpm dev

  loan:env-check:
    desc: "Vérifie que les secrets Supabase ne sont pas dans le build loan"
    dir: loan
    cmds:
      - "! grep -r 'service_role' .next .vercel/output 2>/dev/null"
      - "! grep -r 'SUPABASE_SERVICE_ROLE_KEY' .next .vercel/output 2>/dev/null"

  loan:deploy:
    desc: "Build local + env-check + deploy --prebuilt vers Vercel prod"
    dir: loan
    cmds:
      - task: loan:build-catalog
      - vercel build --prod
      - task: loan:env-check
      - vercel deploy --prebuilt --prod
